# ============================================================
# VerlustRückholung – Nginx Server Block Configuration
# ============================================================
#
# Usage:
#   1. Copy or symlink this file to your Nginx sites directory:
#        sudo cp nginx.conf /etc/nginx/sites-available/verlustrueckholung
#        sudo ln -s /etc/nginx/sites-available/verlustrueckholung \
#                   /etc/nginx/sites-enabled/verlustrueckholung
#
#   2. Replace every occurrence of:
#        - "verlustrueckholung.de"  → your actual domain
#        - "/var/www/verlustrueckholung" → absolute path to this repo root
#        - "127.0.0.1:9000"         → your PHP-FPM socket/address
#          (common alternatives: unix:/run/php/php8.2-fpm.sock)
#
#   3. Obtain TLS certificates (Let's Encrypt recommended):
#        sudo certbot --nginx -d verlustrueckholung.de -d www.verlustrueckholung.de
#
#   4. Test and reload Nginx:
#        sudo nginx -t && sudo systemctl reload nginx
#
# ============================================================

# ── Redirect HTTP → HTTPS ────────────────────────────────────
server {
    listen 80;
    listen [::]:80;
    server_name verlustrueckholung.de www.verlustrueckholung.de;

    # Allow Let's Encrypt ACME challenges
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://verlustrueckholung.de$request_uri;
    }
}

# ── Redirect www → non-www (HTTPS) ──────────────────────────
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name www.verlustrueckholung.de;

    ssl_certificate     /etc/letsencrypt/live/verlustrueckholung.de/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/verlustrueckholung.de/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    return 301 https://verlustrueckholung.de$request_uri;
}

# ── Main HTTPS server block ──────────────────────────────────
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name verlustrueckholung.de;

    root  /var/www/verlustrueckholung;
    index index.php index.html;

    # ── TLS ──────────────────────────────────────────────────
    ssl_certificate     /etc/letsencrypt/live/verlustrueckholung.de/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/verlustrueckholung.de/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # ── Security headers ─────────────────────────────────────
    add_header X-Content-Type-Options   "nosniff"                       always;
    add_header X-Frame-Options          "SAMEORIGIN"                    always;
    add_header X-XSS-Protection         "1; mode=block"                 always;
    add_header Referrer-Policy          "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy       "geolocation=(), microphone=(), camera=()" always;

    # ── Disable directory listing ────────────────────────────
    autoindex off;

    # ── Logging ──────────────────────────────────────────────
    access_log /var/log/nginx/verlustrueckholung_access.log;
    error_log  /var/log/nginx/verlustrueckholung_error.log;

    # ── Block access to sensitive files ─────────────────────
    # Prevents direct access to config, auth, DB helpers, etc.
    location ~* (composer\.(json|lock)|\.env|/config/config\.php|/includes/(db|auth|functions|mailer)\.php)$ {
        deny all;
        return 404;
    }

    # Block access to .htaccess and hidden files
    location ~ /\. {
        deny all;
        return 404;
    }

    # ── Static asset caching ─────────────────────────────────
    location ~* \.(css|js)$ {
        expires 30d;
        add_header Cache-Control "public, no-transform";
    }
    location ~* \.(png|jpg|jpeg|gif|webp|svg|ico)$ {
        expires 180d;
        add_header Cache-Control "public, no-transform";
    }
    location ~* \.(woff|woff2|ttf|otf|eot)$ {
        expires 365d;
        add_header Cache-Control "public, no-transform";
    }

    # ── GZIP compression ─────────────────────────────────────
    gzip            on;
    gzip_vary       on;
    gzip_min_length 1024;
    gzip_proxied    any;
    gzip_comp_level 6;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        application/xml
        image/svg+xml
        font/woff2;

    # ── sitemap.xml → sitemap.php ────────────────────────────
    location = /sitemap.xml {
        rewrite ^ /sitemap.php last;
    }

    # ── robots.txt (static file, already present in repo) ────
    location = /robots.txt {
        try_files $uri =404;
    }

    # ── Blog: /blog/ → blog/index.php ────────────────────────
    location = /blog/ {
        try_files $uri /blog/index.php$is_args$args;
    }
    location = /blog {
        return 301 /blog/;
    }

    # ── Blog: /blog/{slug} → blog/post.php?slug={slug} ───────
    location ~ ^/blog/([a-z0-9\-]+)/?$ {
        try_files $uri /blog/post.php?slug=$1&$args;
    }

    # ── Admin area: all .php files pass through PHP-FPM ──────
    location ^~ /admin/ {
        location ~ \.php$ {
            include        fastcgi_params;
            fastcgi_pass   127.0.0.1:9000;
            fastcgi_index  index.php;
            fastcgi_param  SCRIPT_FILENAME $document_root$fastcgi_script_name;
            fastcgi_param  PHP_VALUE "display_errors=0";
        }
    }

    # ── Front controller (catch-all → index.php) ─────────────
    location / {
        try_files $uri $uri/ /index.php$is_args$args;
    }

    # ── PHP-FPM handler ──────────────────────────────────────
    location ~ \.php$ {
        # Mitigate PHP path-info exploits
        try_files $uri =404;

        include        fastcgi_params;
        fastcgi_pass   127.0.0.1:9000;
        fastcgi_index  index.php;
        fastcgi_param  SCRIPT_FILENAME $document_root$fastcgi_script_name;
        fastcgi_param  PHP_VALUE "display_errors=0";

        # Increase timeout for AI generation calls (OpenAI can be slow)
        fastcgi_read_timeout 60s;
    }
}
