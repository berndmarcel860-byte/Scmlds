# =========================================================
# verlustrueckholung.de — Nginx site configuration
# =========================================================
#
# To deploy:
#   sudo cp nginx.conf /etc/nginx/sites-available/verlustrueckholung.de
#   sudo ln -s /etc/nginx/sites-available/verlustrueckholung.de \
#              /etc/nginx/sites-enabled/verlustrueckholung.de
#   sudo nginx -t && sudo systemctl reload nginx
#
# SSL certificates are managed by Certbot.
# To issue/renew: sudo certbot --nginx -d verlustrueckholung.de -d www.verlustrueckholung.de
# =========================================================

server {
    server_name verlustrueckholung.de www.verlustrueckholung.de;

    root  /var/www/verlustrueckholung.de;
    index index.php index.html index.htm;

    # ── Security headers ─────────────────────────────────────
    add_header X-Content-Type-Options   "nosniff"                         always;
    add_header X-Frame-Options          "SAMEORIGIN"                      always;
    add_header X-XSS-Protection         "1; mode=block"                   always;
    add_header Referrer-Policy          "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy       "geolocation=(), microphone=(), camera=()" always;

    # ── Block access to hidden files (.htaccess, .env, .git …) ─
    location ~ /\. {
        deny all;
        return 404;
    }

    # ── Block direct access to sensitive PHP/config files ────
    location ~* (composer\.(json|lock)|/config/config\.php|/includes/(db|auth|functions|mailer)\.php)$ {
        deny all;
        return 404;
    }

    # ── ACME challenge (Certbot) ──────────────────────────────
    location /.well-known/acme-challenge/ {
        root  /var/www/verlustrueckholung.de;
        allow all;
    }

    # ── sitemap.xml → sitemap.php ────────────────────────────
    location = /sitemap.xml {
        rewrite ^ /sitemap.php last;
    }

    # ── robots.txt ───────────────────────────────────────────
    location = /robots.txt {
        try_files $uri =404;
    }

    # ── Blog index: /blog or /blog/ → blog/index.php ─────────
    location = /blog {
        return 301 /blog/;
    }
    location = /blog/ {
        try_files $uri /blog/index.php$is_args$args;
    }

    # ── Blog posts: /blog/{slug} → blog/post.php?slug={slug} ─
    location ~ ^/blog/([a-z0-9\-]+)/?$ {
        try_files $uri /blog/post.php?slug=$1&$args;
    }

    # ── Main site routing ────────────────────────────────────
    location / {
        try_files $uri $uri/ $uri.php?$args;
        if (!-e $request_filename) {
            rewrite ^/(.*)$ /$1.php last;
        }
    }

    # ── PHP-FPM (PHP 8.3) ────────────────────────────────────
    location ~ \.php$ {
        include fastcgi_params;
        fastcgi_pass  unix:/var/run/php/php8.3-fpm.sock;
        fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        # Increase timeout for AI generation calls (OpenAI can be slow)
        fastcgi_read_timeout 60s;
    }

    error_page 404 /index.html;

    listen [::]:443 ssl; # managed by Certbot
    listen 443 ssl;      # managed by Certbot
    ssl_certificate     /etc/letsencrypt/live/verlustrueckholung.de/fullchain.pem; # managed by Certbot
    ssl_certificate_key /etc/letsencrypt/live/verlustrueckholung.de/privkey.pem;   # managed by Certbot
    include             /etc/letsencrypt/options-ssl-nginx.conf;                   # managed by Certbot
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;                         # managed by Certbot
}

# ── HTTP → HTTPS redirect (managed by Certbot) ───────────────
server {
    if ($host = www.verlustrueckholung.de) {
        return 301 https://$host$request_uri;
    } # managed by Certbot

    if ($host = verlustrueckholung.de) {
        return 301 https://$host$request_uri;
    } # managed by Certbot

    listen 80;
    listen [::]:80;
    server_name verlustrueckholung.de www.verlustrueckholung.de;
    return 404; # managed by Certbot
}
