# =========================================================
# 🌐 kryptoxpay.co.uk — HTTPS (Certbot-managed SSL)
# =========================================================

server {
    server_name kryptoxpay.co.uk www.kryptoxpay.co.uk;

    root /var/www/kryptoxpay.co.uk;
    index index.php index.html index.htm;

    # --- ACME Challenge (for Certbot) ---
    location /.well-known/acme-challenge/ {
        root /var/www/kryptoxpay.co.uk;
        allow all;
    }

    # --- Main site routing ---
    location / {
        try_files $uri $uri/ $uri.php?$args;
        if (!-e $request_filename) {
            rewrite ^/(.*)$ /$1.php last;
        }
    }

    # --- IndexNow key-verification endpoint: GET /<hex-key>.txt ---
    location ~* ^/[a-f0-9]{16,64}\.txt$ {
        rewrite ^ /indexnow.php?verify=1 last;
    }

    # --- PHP handling ---
    location ~ \.php$ {
        include fastcgi_params;
        fastcgi_pass unix:/var/run/php/php8.3-fpm.sock;
        fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
    }

    error_page 404 /index.html;

    listen [::]:443 ssl; # managed by Certbot
    listen 443 ssl;      # managed by Certbot
    ssl_certificate     /etc/letsencrypt/live/kryptoxpay.co.uk/fullchain.pem; # managed by Certbot
    ssl_certificate_key /etc/letsencrypt/live/kryptoxpay.co.uk/privkey.pem;   # managed by Certbot
    include             /etc/letsencrypt/options-ssl-nginx.conf;               # managed by Certbot
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;                     # managed by Certbot
}

# ── HTTP → HTTPS redirect for kryptoxpay.co.uk (managed by Certbot) ─
server {
    if ($host = www.kryptoxpay.co.uk) {
        return 301 https://$host$request_uri;
    } # managed by Certbot

    if ($host = kryptoxpay.co.uk) {
        return 301 https://$host$request_uri;
    } # managed by Certbot

    listen 80;
    listen [::]:80;
    server_name kryptoxpay.co.uk www.kryptoxpay.co.uk;
    return 404; # managed by Certbot
}
